name: FastingTracker CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.swift'
      - '.github/workflows/build-fasting-tracker.yml'
      - 'project.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.swift'
  workflow_dispatch:

jobs:
  # 1. Validare și Compilare rapidă (CI) - Test de integritate cod
  build-and-test:
    name: Verificare Compilare macOS
    runs-on: macos-14
    
    steps:
      - name: Descărcare cod din repozitoriu
        uses: actions/checkout@v3

      - name: Compilare binar nativ macOS (Test de integritate cod)
        run: |
          swiftc -parse-as-library -O \
            CircularProgressView.swift \
            FastingLog.swift \
            FastingPlan.swift \
            FastingViewModel.swift \
            ContentView.swift \
            FastingTrackerApp.swift \
            -o FastingTracker_test
          echo "Compilarea a reușit cu succes! Codul nu conține erori sintactice sau de tip."

  # 2. Publicare automată în App Store (TestFlight)
  # Această etapă folosește semnătura automată Apple (Automatic Signing) prin cheia API de la Apple,
  # generând profilul .mobileprovision direct pe runner în mod dinamic!
  release-app-store:
    name: Publicare în App Store (TestFlight)
    needs: build-and-test
    runs-on: macos-14
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Descărcare cod
        uses: actions/checkout@v3
        
      - name: Selectare versiune Xcode maximă disponibilă
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)
          echo "Selecting highest available Xcode version: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
        
      - name: Instalare XcodeGen
        run: brew install xcodegen
        
      - name: Generare Proiect Xcode (.xcodeproj)
        run: xcodegen generate
        
      - name: Instalare certificat Apple de distribuție
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APP_STORE_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APP_STORE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Creare keychain temporar securizat
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          # Decodare certificat din GitHub Secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          
          # Importare certificat în keychain-ul runner-ului macOS
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
      - name: Configurare Cheie API App Store Connect pe Runner
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          # Creare director pentru cheile private folosite de xcodebuild
          mkdir -p ~/.private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY" > ~/.private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8
          
      - name: Compilare, Semnare și Arhivare aplicație (.ipa) cu Semnătură Automată
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
        run: |
          # Executare build oficial Xcode cu semnare automată prin API Key
          xcodebuild -project FastingTracker.xcodeproj \
                     -scheme FastingTracker \
                     -sdk iphoneos \
                     -configuration Release \
                     -allowProvisioningUpdates \
                     -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
                     -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_ISSUER" \
                     -authenticationKeyPath "$HOME/.private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8" \
                     -archivePath $RUNNER_TEMP/FastingTracker.xcarchive \
                     archive
                     
          # Exportare pachet IPA final pentru upload
          xcodebuild -exportArchive \
                     -archivePath $RUNNER_TEMP/FastingTracker.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -allowProvisioningUpdates \
                     -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
                     -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_ISSUER" \
                     -authenticationKeyPath "$HOME/.private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8" \
                     -exportPath $RUNNER_TEMP/build
                     
      - name: Încărcare binar în App Store Connect / TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
        run: |
          # Trimite fișierul .ipa rezultat direct în contul tău Apple Developer
          xcrun altool --upload-app \
                       -f $RUNNER_TEMP/build/FastingTracker.ipa \
                       -t ios \
                       --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
                       --apiIssuer "$APP_STORE_CONNECT_API_ISSUER"
