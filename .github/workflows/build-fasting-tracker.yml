name: FastingTracker CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.swift'
      - '.github/workflows/build-fasting-tracker.yml'
      - 'project.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.swift'
  workflow_dispatch:

jobs:
  # 1. Validare, Compilare (CI) și Generare Capturi de Ecran de Simulator
  build-and-test:
    name: Verificare și Generare Screenshots
    runs-on: macos-14
    
    steps:
      - name: Descărcare cod din repozitoriu
        uses: actions/checkout@v3

      - name: Compilare binar nativ macOS (Test de integritate cod)
        run: |
          swiftc -parse-as-library -O \
            CircularProgressView.swift \
            FastingLog.swift \
            FastingPlan.swift \
            FastingViewModel.swift \
            ContentView.swift \
            FastingTrackerApp.swift \
            -o FastingTracker_test
          echo "Compilarea a reușit cu succes! Codul nu conține erori sintactice sau de tip."

      - name: Selectare versiune Xcode stabilă (GM)
        run: sudo xcode-select -s /Applications/Xcode_16.1.app
        
      - name: Instalare XcodeGen
        run: brew install xcodegen

      - name: Generare Iconițe și Asset Catalog în mod dinamic
        run: swift generate_assets.swift

      - name: Generare Proiect Xcode (.xcodeproj)
        run: xcodegen generate

      - name: Rularea Simulatorului iOS și Realizarea capturilor de ecran
        run: |
          # Detecție dispozitiv de tip iPhone (ex: iPhone 15 Pro Max care are ecran de 6.5" / 6.7" acceptat de Apple)
          DEVICE_ID=$(xcrun simctl list devices | grep "iPhone 15 Pro Max" | grep -v "unavailable" | head -n 1 | awk -F '(' '{print $2}' | awk -F ')' '{print $1}')
          if [ -z "$DEVICE_ID" ]; then
            # Fallback pe primul iPhone disponibil dacă iPhone 15 Pro Max nu există
            DEVICE_ID=$(xcrun simctl list devices | grep "iPhone" | grep -v "unavailable" | head -n 1 | awk -F '(' '{print $2}' | awk -F ')' '{print $1}')
          fi
          echo "Dispozitiv selectat: $DEVICE_ID"
          
          # Pornire simulator în fundal (evitând erorile dacă este deja pornit)
          xcrun simctl boot "$DEVICE_ID" || true
          
          # Compilare aplicație pentru Simulator
          xcodebuild -project FastingTracker.xcodeproj \
                     -scheme FastingTracker \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     -destination "id=$DEVICE_ID" \
                     build || true
                     
          # Localizare fișier .app compilat
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "FastingTracker.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            echo "Aplicație compilată găsită la: $APP_PATH"
            
            # Instalare și deschidere aplicație pe simulatorul pornit
            xcrun simctl install booted "$APP_PATH" || true
            xcrun simctl launch booted com.oalexoprea.FastingTracker || true
            
            # Așteptare 8 secunde pentru ca interfața aplicației să se încarce complet
            sleep 8
          fi
          
          # Creare director pentru capturi de ecran
          mkdir -p screenshots
          
          # Realizare captură de ecran (dimensiune optimă de 6.5"/6.7" pentru App Store)
          xcrun simctl io booted screenshot screenshots/FastingTracker_screenshot_6.5.png || true
          
          # Redimensionare sigură la rezoluția optimă de 6.5" pentru App Store (1242x2688 px)
          if [ -f screenshots/FastingTracker_screenshot_6.5.png ]; then
            sips -z 2688 1242 screenshots/FastingTracker_screenshot_6.5.png
            echo "Captura de ecran a fost realizată și redimensionată cu succes!"
          else
            echo "Avertisment: Captura de ecran nu a putut fi generată de pe simulator."
          fi

      - name: Încărcare Capturi de Ecran ca Artifacte GitHub
        uses: actions/upload-artifact@v4
        with:
          name: App-Store-Screenshots-6.5
          path: screenshots/

  # 2. Publicare automată în App Store (TestFlight)
  # Această etapă folosește semnătura automată Apple (Automatic Signing) prin cheia API de la Apple,
  # generând profilul .mobileprovision direct pe runner în mod dinamic!
  release-app-store:
    name: Publicare în App Store (TestFlight)
    needs: build-and-test
    runs-on: macos-14
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Descărcare cod
        uses: actions/checkout@v3
        
      - name: Selectare versiune Xcode stabilă (GM)
        run: sudo xcode-select -s /Applications/Xcode_16.1.app
        
      - name: Instalare XcodeGen
        run: brew install xcodegen
        
      - name: Generare Iconițe și Asset Catalog în mod dinamic
        run: swift generate_assets.swift
        
      - name: Generare Proiect Xcode (.xcodeproj)
        run: xcodegen generate
        
      - name: Instalare certificat Apple de distribuție
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APP_STORE_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APP_STORE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Creare keychain temporar securizat
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          # Decodare certificat din GitHub Secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          
          # Importare certificat în keychain-ul runner-ului macOS
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
      - name: Configurare Cheie API App Store Connect pe Runner
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          # Creare director pentru cheile private folosite de xcodebuild
          mkdir -p ~/.private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY" > ~/.private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8
          
      - name: Compilare, Semnare și Arhivare aplicație (.ipa) cu Semnătură Automată
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
        run: |
          # Executare build oficial Xcode cu semnare dezactivată în faza de arhivare (pentru a evita cerința certificatului de dezvoltare)
          xcodebuild -project FastingTracker.xcodeproj \
                     -scheme FastingTracker \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath $RUNNER_TEMP/FastingTracker.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     archive
                     
          # Exportare pachet IPA final pentru upload
          xcodebuild -exportArchive \
                     -archivePath $RUNNER_TEMP/FastingTracker.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -allowProvisioningUpdates \
                     -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
                     -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_ISSUER" \
                     -authenticationKeyPath "$HOME/.private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8" \
                     -exportPath $RUNNER_TEMP/build
                     
      - name: Încărcare binar în App Store Connect / TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
        run: |
          # Trimite fișierul .ipa rezultat direct în contul tău Apple Developer
          xcrun altool --upload-app \
                       -f $RUNNER_TEMP/build/FastingTracker.ipa \
                       -t ios \
                       --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
                       --apiIssuer "$APP_STORE_CONNECT_API_ISSUER"
