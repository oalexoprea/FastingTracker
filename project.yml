name: FastingTracker
options:
  bundleIdPrefix: com.oalexoprea
  minimumXcodeVersion: "15.0"
targets:
  FastingTracker:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    settings:
      DEVELOPMENT_TEAM: MT4VPZ4AVA
      GENERATE_INFOPLIST_FILE: true
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "FastingTracker"
          - ".github/**"
          - "FastingTracker_test"
