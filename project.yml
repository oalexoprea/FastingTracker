name: FastingTracker
options:
  bundleIdPrefix: com.oalexoprea
  minimumXcodeVersion: "15.0"
targets:
  FastingTracker:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    settings:
      DEVELOPMENT_TEAM: MT4VPZ4AVA
      GENERATE_INFOPLIST_FILE: true
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
      TARGETED_DEVICE_FAMILY: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      plist:
        DTSDKName: iphoneos26.0
        DTXcode: "2600"
        DTXcodeBuild: "26A123"
        DTSDKBuild: "26A123"
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "FastingTracker"
          - ".github/**"
          - "FastingTracker_test"
          - "generate_assets.swift"
      - path: Assets.xcassets
